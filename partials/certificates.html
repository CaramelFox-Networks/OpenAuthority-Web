<div class="card">
  <div class="card-header"><h2 class="card-title">Verified Certificate Authorities</h2><p class="card-description">Probationary CAs are verified every 6 hours. Active CAs are verified every 24 hours.</p></div>
  <div class="search-box">
    <input type="text" class="search-input" id="certSearch" placeholder="Search by subject, domain, or fingerprint...">
    <button class="btn btn-secondary" id="certSearchBtn">Search</button>
  </div>
  <div id="certList" class="cert-list"><div class="loading"><div class="spinner"></div>Loading certificates...</div></div>
  <div id="certPagination" class="pagination"></div>
</div>
